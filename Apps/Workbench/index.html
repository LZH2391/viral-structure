<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>结构迁移工作台</title>
    <script>
      if (location.protocol === "file:") location.replace("http://127.0.0.1:5177/");
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="project-block">
          <div class="project-name">结构迁移工作台</div>
          <div id="saveStatus" class="save-status">本地草稿</div>
        </div>
        <div class="run-strip">
          <span id="runStatus" class="run-pill">等待输入</span>
          <span id="traceLabel" class="trace-label">trace 未创建</span>
        </div>
        <div class="top-actions">
          <button id="rerunStageBtn" class="ghost-button" type="button">重跑阶段</button>
          <a class="ghost-button action-link" href="http://127.0.0.1:5177/debug">运行追踪</a>
          <button class="ghost-button" type="button" disabled>导出</button>
          <button id="snapshotBtn" class="primary-button" type="button">DebugSnapshot</button>
        </div>
      </header>

      <main class="workspace-grid">
        <aside class="resource-panel" aria-label="资源区">
          <section class="resource-view active" data-view="materials">
            <label class="upload-target" for="sampleVideoInput">
              <input id="sampleVideoInput" type="file" accept="video/*" />
              <span class="upload-title">选择样例视频</span>
              <span id="sampleFileLabel" class="upload-meta">未选择文件</span>
            </label>
            <label class="sampling-control">
              <span>抽帧采样率</span>
              <input id="frameSampleRateInput" type="number" min="0.1" max="2" step="0.05" value="0.25" />
              <small>每秒抽多少帧</small>
            </label>
            <div class="section-heading">媒体派生</div>
            <div id="derivativeList" class="compact-list"></div>
          </section>
        </aside>

        <section class="preview-panel" aria-label="中央预览区">
          <div class="preview-toolbar">
            <div class="section-heading">媒体查看器</div>
            <div id="previewMeta" class="preview-meta">未加载样例</div>
          </div>

          <div id="previewStage" class="preview-stage">
            <div id="emptyPreview" class="preview-empty">
              <div class="frame-mark"></div>
              <strong>等待样例视频</strong>
              <span>上传后显示预览、封面和抽帧</span>
            </div>
            <video id="sampleVideo" class="sample-video" controls playsinline></video>
            <img id="mediaImagePreview" class="media-image-preview" alt="" />
            <audio id="audioPreview" class="audio-preview" controls></audio>
            <div id="mediaEmptyPreview" class="media-empty-preview"></div>
          </div>
        </section>

        <aside class="property-panel" aria-label="属性区">
          <section class="property-section">
            <div class="section-heading">当前片段</div>
            <div id="currentSegment" class="detail-block"></div>
          </section>
        </aside>

        <section class="timeline-panel" aria-label="底部时间线">
          <div class="timeline-header">
            <span>视频帧轨</span>
            <span>字幕/语音轨</span>
          </div>
          <div class="timeline-body">
            <div id="frameTrack" class="track frame-track"></div>
            <div id="captionTrack" class="track muted-track"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="./scripts/state.js"></script>
    <script src="./scripts/dom.js"></script>
    <script src="./scripts/media.js"></script>
    <script src="./scripts/api-client.js"></script>
    <script src="./scripts/sample-ingest.js"></script>
    <script src="./scripts/structure-strategy.js"></script>
    <script src="./scripts/transfer-strategy.js"></script>
    <script src="./scripts/render-templates.js"></script>
    <script src="./scripts/render.js"></script>
    <script src="./scripts/observability.js"></script>
    <script src="./scripts/versioning.js"></script>
    <script src="./scripts/workflow.js"></script>
    <script src="./scripts/events.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
